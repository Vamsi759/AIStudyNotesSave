<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Expandable Subjects Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial;
}

.container{
    display:flex;
    height:100vh;
}

/* LEFT */
.sidebar{
    width:30%;
    background:#2c3e50;
    color:white;
    padding:15px;
    overflow-y:auto;
}

/* RIGHT */
.content{
    width:70%;
    padding:20px;
    background:#ecf0f1;
}

.btn{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    background:#34495e;
    color:white;
    text-align:left;
    cursor:pointer;
}

.btn:hover{
    background:#1abc9c;
}

.subtopic-container{
    margin-left:20px;
}

.sub-btn{
    width:90%;
    padding:8px;
    margin-top:4px;
    border:none;
    background:#16a085;
    color:white;
    text-align:left;
    cursor:pointer;
}

.sub-btn:hover{
    background:#27ae60;
}

</style>

</head>
<body>

<div class="container">

    <!-- LEFT -->
    <div class="sidebar" id="sidebar"></div>

    <!-- RIGHT -->
    <div class="content" id="contentArea">
        <h2>Welcome</h2>
        <p>Select any subtopic.</p>
    </div>

</div>

<script>

/* ================= DATA ================= */

const data = {

    "C++": {

        "Data Types": {
            "int":"Stores integer values.",
            "char":"Stores single character.",
            "string":"Stores text values.",
            "bool":"Stores true or false."
        },

        "Loops": {
            "for loop":"Used when iterations known.",
            "while loop":"Runs while condition true."
        }

    },

    "Java": {

        "OOPs": {
            "Inheritance":"Acquire parent properties.",
            "Polymorphism":"Multiple forms."
        },

        "Multithreading": {
            "Thread":"Lightweight process.",
            "Synchronization":"Controls shared access."
        }

    }

};

/* ================= LOAD SUBJECTS ================= */

function loadSubjects(){

    let sidebar = document.getElementById("sidebar");

    sidebar.innerHTML = "<h2>Subjects</h2>";

    for(let subject in data){

        let subjectBtn = document.createElement("button");

        subjectBtn.className = "btn";
        subjectBtn.innerText = subject;

        subjectBtn.onclick = () => loadTopics(subject);

        sidebar.appendChild(subjectBtn);
    }
}

/* ================= LOAD TOPICS ================= */

function loadTopics(subject){

    let sidebar = document.getElementById("sidebar");

    sidebar.innerHTML = `<h2>${subject}</h2>`;

    let backBtn = document.createElement("button");

    backBtn.className = "btn";
    backBtn.innerText = "⬅ Back";

    backBtn.onclick = loadSubjects;

    sidebar.appendChild(backBtn);

    /* TOPICS */

    for(let topic in data[subject]){

        let topicBtn = document.createElement("button");

        topicBtn.className = "btn";
        topicBtn.innerText = topic;

        sidebar.appendChild(topicBtn);

        /* CONTAINER FOR SUBTOPICS */

        let subContainer = document.createElement("div");

        subContainer.className = "subtopic-container";

        sidebar.appendChild(subContainer);

        /* TOGGLE SUBTOPICS */

        topicBtn.onclick = () => {

            /* CLOSE if already open */

            if(subContainer.innerHTML !== ""){
                subContainer.innerHTML = "";
                return;
            }

            let subtopics = data[subject][topic];

            for(let sub in subtopics){

                let subBtn = document.createElement("button");

                subBtn.className = "sub-btn";
                subBtn.innerText = sub;

                subBtn.onclick = () => {
                    showContent(sub, subtopics[sub]);
                };

                subContainer.appendChild(subBtn);
            }

        };

    }

}

/* ================= SHOW CONTENT ================= */

function showContent(title, text){

    let content = document.getElementById("contentArea");

    content.innerHTML = `
        <h2>${title}</h2>
        <p>${text}</p>
    `;
}

/* INIT */

loadSubjects();

</script>

</body>
</html>
